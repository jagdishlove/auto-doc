<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Document shape -->
  <rect x="22" y="10" width="60" height="78" rx="6" fill="url(#docGrad)" opacity="0.95"/>
  <!-- Folded corner -->
  <path d="M68 10 L82 10 L82 24 Z" fill="#0c4a6e" opacity="0.6"/>
  <path d="M68 10 L68 24 L82 24" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.5"/>

  <!-- Text lines on document -->
  <rect x="32" y="30" width="36" height="4" rx="2" fill="white" opacity="0.85"/>
  <rect x="32" y="40" width="28" height="4" rx="2" fill="white" opacity="0.6"/>
  <rect x="32" y="50" width="32" height="4" rx="2" fill="white" opacity="0.6"/>
  <rect x="32" y="60" width="20" height="4" rx="2" fill="white" opacity="0.45"/>

  <!-- AI Sparkles -->
  <!-- Large sparkle top-right -->
  <path d="M88 30 L91 22 L94 30 L102 33 L94 36 L91 44 L88 36 L80 33 Z" fill="url(#sparkGrad)"/>
  <!-- Medium sparkle bottom-left -->
  <path d="M18 72 L20 67 L22 72 L27 74 L22 76 L20 81 L18 76 L13 74 Z" fill="url(#sparkGrad)" opacity="0.7"/>
  <!-- Small sparkle mid-right -->
  <path d="M90 62 L92 58 L94 62 L98 63.5 L94 65 L92 69 L90 65 L86 63.5 Z" fill="#38bdf8" opacity="0.5"/>

  <!-- Subtle circular glow behind sparkles -->
